<div class="face-snap-card">
  <h2>{{ faceSnap.title | uppercase }}</h2>
  <p>{{ faceSnap.description | titlecase }}</p>
  <img [src]="faceSnap.imageUrl" alt="{{ faceSnap.title }}" />
  <p>{{ faceSnap.createdDate }}</p>
  <p>{{ faceSnap.createdDate | date: 'fullDate' }}</p>
  <button (click)="Snap()" [ngClass]="{ green: hassnaped, red: !hassnaped }">
    {{ textsnap | lowercase }} {{ faceSnap.snaps }} 🤌
  </button>
</div>
